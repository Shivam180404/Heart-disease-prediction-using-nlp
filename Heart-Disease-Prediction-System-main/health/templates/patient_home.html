{% extends 'index.html' %}
{% load static %}
{% block body %}

<div class="container-fluid" style="margin-top:100px;margin-bottom:2%;width:100%">
    <h2 align="center" style="font-weight:bold;font-family:roman">PATIENT DASHBOARD</h2><hr/>
    <br>
    <div class="container">
        <div class="card shadow-sm" style="border-radius:14px;border:1px solid #dbe7f0;overflow:hidden;">
            <img src="{% static 'images/heart.jpg' %}" alt="Heart Care Banner" style="width:100%;max-height:300px;object-fit:cover;">
            <div class="card-body text-center">
                <h3 style="font-weight:700;color:#1c3e57;">Welcome to the Patient Dashboard</h3>
                <p style="margin-top:8px;">Track your health inputs, run heart-risk prediction, and review previous records from one place.</p>
                <div class="mt-3">
                    <a href="/add_heartdetail" class="btn btn-info mr-2">Start Prediction</a>
                    <a href="/view_search_pat" class="btn btn-outline-info mr-2">View History</a>
                    <a href="/profile_doctor" class="btn btn-outline-secondary">My Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>


{% endblock %}
